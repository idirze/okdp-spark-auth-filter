name: Release [prepare]

on:
  push:
    paths:
      - '.github/release.yml'

permissions:
  contents: write
  pull-requests: write

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  # Only cancel in-progress jobs or runs for the current workflow - matches against branch & tags
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo ⚡️
        uses: actions/checkout@v4

      - name: Configure git 📦
        run: |
          git config --local user.email "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git config --local user.name "github-actions[bot]"

      - name: Retrieve release metadata 📦
        id: release
        uses: mikefarah/yq@v4.42.1
        with:
          cmd: yq -oj e '.release' .github/release.yml

      - name: Set up JDK 11 📦
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          cache: 'maven'
          check-latest: true
          server-id: 'central'
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      # Change the pom project version to 'current-version'
      # Run the validations (tests, checkstyle etc.)
      # Commit (PR: The push is disabled including pushing tags -> pushChanges = false)
      # Increase the pom project version to 'next-version'
      # Commit the changes
      # Build and deploy the release from the local tag
      - name: test1
        run: git branch

      - name: Maven release ${{ fromJSON(steps.release.outputs.result).current-version }} -> ${{ fromJSON(steps.release.outputs.result).next-version }} 📤
        run: |
          mvn -ntp --batch-mode release:clean release:prepare \
             -DreleaseVersion=${{ fromJSON(steps.release.outputs.result).current-version }} \
             -DdevelopmentVersion=${{ fromJSON(steps.release.outputs.result).next-version }} \
             -Darguments='-Dpassword=${GIT_TOKEN}'
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: test2
        run: git branch
      - name: Create maven release branch ${{ fromJSON(steps.release.outputs.result).current-version }} 📤
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: v${{ fromJSON(steps.release.outputs.result).next-version }}
          force: true

      - name: Create maven release tag ${{ fromJSON(steps.release.outputs.result).current-version }} 📤
        uses: ad-m/github-push-action@v0.8.0
        with:
          branch: v${{ fromJSON(steps.release.outputs.result).next-version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tags: true
          force_with_lease: true

      - name: Create Pull Request for next development iteration 📦
        uses: peter-evans/create-pull-request@v6
        with:
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          base: main
          branch: v${{ fromJSON(steps.release.outputs.result).next-version }}
          delete-branch: true
          title: '[maven-release-plugin] Maven release'
          body: |
            Maven release
            - Prepare release ${{ fromJSON(steps.release.outputs.result).current-version }}
            - Publish to [Maven central repository][1]
            - Prepare for next development iteration ${{ fromJSON(steps.release.outputs.result).next-version }}
            
            [1]: https://central.sonatype.com/artifact/io.okdp/okdp-spark-auth-filter/overview
          #team-reviewers: reviewers
          labels: |
            maven-release
