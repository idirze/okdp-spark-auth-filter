name: Release [prepare]

on:
  pull_request:
    types: [labeled]
    branches:
      - main
    paths:
      - '.github/release.yml'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  # Only cancel in-progress jobs or runs for the current workflow - matches against branch & tags
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'idirze' && contains(github.event.pull_request.labels.*.name, 'maven-release')
    steps:
      - name: Get current branch 📦
        id: branch
        uses: tj-actions/branch-names@v8

      - name: Checkout Repo ⚡️
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.current_branch }}
          fetch-depth: 0

      - name: Set up GitHub Actions git bot
        uses: ./.github/actions/setup-git-bot

      - name: Retrieve release metadata 📦
        id: release
        uses: mikefarah/yq@v4.42.1
        with:
          cmd: yq -oj e '.release' .github/release.yml

      - name: Set up JDK 11 📦
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          cache: 'maven'
          check-latest: true
          server-id: 'central'
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Comment Pull Request for maven publish and next development iteration 📦
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Maven release:
            - Prepare release v${{ fromJSON(steps.release.outputs.result).current-version }} (see below the list of changes)
            - Create release tag [v${{ fromJSON(steps.release.outputs.result).current-version }}][2]
            - Publish to [Maven central repository][1]
            - Prepare for next development iteration ${{ fromJSON(steps.release.outputs.result).next-version }}
            
            [1]: https://central.sonatype.com/artifact/io.okdp/okdp-spark-auth-filter/overview
            [2]: https://github.com/okdp/okdp-spark-auth-filter/tree/v${{ fromJSON(steps.release.outputs.result).current-version }}

      # Change the pom project version to 'current-version'
      # Run the validations (tests, checkstyle etc.)
      # Commit (PR: The push is disabled including pushing tags -> pushChanges = false)
      # Increase the pom project version to 'next-version'
      # Commit the changes
      # Build and deploy the release from the local tag
      - name: Maven release prepare ${{ fromJSON(steps.release.outputs.result).current-version }} -> ${{ fromJSON(steps.release.outputs.result).next-version }} 📤
        run: |
          mvn -ntp --batch-mode release:clean release:prepare \
             -DreleaseVersion=${{ fromJSON(steps.release.outputs.result).current-version }} \
             -DdevelopmentVersion=${{ fromJSON(steps.release.outputs.result).next-version }} \
             -Darguments='-Dpassword=${GIT_TOKEN}'
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

