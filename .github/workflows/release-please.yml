name: release-please

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths-ignore:
      - "README.md"

permissions:
  contents: write
  pull-requests: write

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  # Only cancel in-progress jobs or runs for the current workflow - matches against branch & tags
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
    if: github.repository_owner == 'idirze' && github.event.pull_request.merged == true
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release-please

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: [release-please]
    if: github.repository_owner == 'idirze' && needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release-please
        with:
          release-type: simple

      - name: Checkout Repo ⚡️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up GitHub Actions git bot 📦
        uses: ./.github/actions/setup-git-bot

      - name: Retrieve release metadata 📦
        id: release
        uses: mikefarah/yq@v4.42.1
        with:
          cmd: yq -oj e '.release' .github/release.yml

      - name: Set up JDK 11 📦
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          cache: 'maven'
          check-latest: true
          server-id: 'central'
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      #  - name: Set Github Release version
      #    run: |
      #      git commit --allow-empty -m "chore: release v${{ fromJSON(steps.release.outputs.result).current-version }}" \
      #                               -m "Release-As: v${{ fromJSON(steps.release.outputs.result).current-version }}"

      #      - name: Push maven release:prepare changes to ${{ steps.branch.outputs.current_branch }}
      #        run: |
      #          git pull --rebase
      #          git push -u origin ${{ steps.branch.outputs.current_branch }}

      - name: Publish to maven central 📤
        run: |
          git checkout tags/${{ fromJSON(steps.release.outputs.result).current-version }}
          mvn clean deploy -Prelease -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}





